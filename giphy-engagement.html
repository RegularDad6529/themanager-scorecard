<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  padding: 20px;
}
h1 {
  font-size: 1.5rem;
  color: #58a6ff;
  margin-bottom: 4px;
}
.subtitle {
  color: #8b949e;
  font-size: 0.85rem;
  margin-bottom: 16px;
}
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid #30363d;
  margin-bottom: 16px;
}
.tab {
  background: transparent;
  border: 1px solid transparent;
  border-bottom: none;
  color: #8b949e;
  padding: 8px 16px;
  cursor: pointer;
  font-size: 0.9rem;
  border-radius: 6px 6px 0 0;
  font-family: inherit;
}
.tab:hover { color: #c9d1d9; }
.tab.active {
  background: #161b22;
  color: #58a6ff;
  border-color: #30363d;
  border-bottom: 1px solid #0d1117;
  margin-bottom: -1px;
}
.tab-pane { display: none; }
.tab-pane.active { display: block; }
.controls {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
input[type="text"] {
  background: #161b22;
  border: 1px solid #30363d;
  color: #c9d1d9;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 0.9rem;
  width: 250px;
}
input[type="text"]:focus {
  outline: none;
  border-color: #58a6ff;
}
select {
  background: #161b22;
  border: 1px solid #30363d;
  color: #c9d1d9;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 0.9rem;
}
.stats {
  font-size: 0.8rem;
  color: #8b949e;
  margin-left: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
}
th {
  background: #161b22;
  color: #8b949e;
  text-align: left;
  padding: 10px 14px;
  cursor: pointer;
  user-select: none;
  border-bottom: 2px solid #30363d;
  white-space: nowrap;
  position: sticky;
  top: 0;
}
th:hover { color: #58a6ff; }
th .arrow { font-size: 0.7rem; margin-left: 4px; opacity: 0.5; }
th.sorted .arrow { opacity: 1; color: #58a6ff; }
td {
  padding: 8px 14px;
  border-bottom: 1px solid #21262d;
}
tr:hover td { background: #161b22; }
.engagement-high { color: #3fb950; font-weight: 600; }
.engagement-mid { color: #d29922; }
.engagement-zero { color: #484f58; }
.views-high { color: #3fb950; font-weight: 600; }
.views-mid { color: #d29922; }
.views-low { color: #db6d28; }
.views-min { color: #484f58; }
a { color: #58a6ff; text-decoration: none; }
a:hover { text-decoration: underline; }
.content-type-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 0.75rem;
  background: #1f6feb22;
  color: #58a6ff;
  border: 1px solid #1f6feb44;
}
.content-type-badge.sticker {
  background: #db6d2822;
  color: #db6d28;
  border-color: #db6d2844;
}
.gif-thumb {
  width: 52px;
  height: 52px;
  border-radius: 6px;
  object-fit: cover;
  border: 1px solid #30363d;
  vertical-align: middle;
}
.preview-cell { display: flex; align-items: center; gap: 10px; }
.preview-cell img { flex-shrink: 0; }
.content-id { font-family: 'SF Mono', monospace; font-size: 0.8rem; color: #8b949e; }
.view-count { font-family: 'SF Mono', monospace; font-weight: 600; }
</style>
</head>
<body>

<h1>Giphy Dashboard — RegularDad</h1>
<p class="subtitle" id="subtitle">47 GIFs · Sortable & filterable · Click column headers to sort</p>

<div class="tabs">
  <button class="tab active" id="tab-eng" onclick="switchTab('eng')">Engagement Rate</button>
  <button class="tab" id="tab-views" onclick="switchTab('views')">View Count</button>
</div>

<!-- Engagement Rate Tab -->
<div class="tab-pane active" id="pane-eng">
  <div class="controls">
    <input type="text" id="searchEng" placeholder="Search term or ID..." oninput="renderEng()">
    <select id="engagementFilter" onchange="renderEng()">
      <option value="all">All engagement rates</option>
      <option value="high">High (≥3.0)</option>
      <option value="mid">Medium (0.1–2.9)</option>
      <option value="zero">Zero (0.0)</option>
    </select>
    <span class="stats" id="statsEng"></span>
  </div>
  <table id="engTable">
    <thead>
      <tr>
        <th onclick="sortByEng('term')">Term <span class="arrow">↕</span></th>
        <th onclick="sortByEng('engagement_rate')">Engagement Rate <span class="arrow">↕</span></th>
        <th onclick="sortByEng('content_type')">Type <span class="arrow">↕</span></th>
        <th onclick="sortByEng('content_id')">Giphy ID <span class="arrow">↕</span></th>
        <th>Preview</th>
      </tr>
    </thead>
    <tbody id="engTbody"></tbody>
  </table>
</div>

<!-- View Count Tab -->
<div class="tab-pane" id="pane-views">
  <div class="controls">
    <input type="text" id="searchViews" placeholder="Search ID..." oninput="renderViews()">
    <select id="viewsFilter" onchange="renderViews()">
      <option value="all">All view counts</option>
      <option value="high">High (≥5000)</option>
      <option value="mid">Medium (1000–4999)</option>
      <option value="low">Low (100–999)</option>
      <option value="min">Minimal (&lt;100)</option>
    </select>
    <span class="stats" id="statsViews"></span>
  </div>
  <table id="viewsTable">
    <thead>
      <tr>
        <th onclick="sortByViews('view_count')">View Count <span class="arrow">↕</span></th>
        <th onclick="sortByViews('content_type')">Type <span class="arrow">↕</span></th>
        <th onclick="sortByViews('content_id')">Giphy ID <span class="arrow">↕</span></th>
        <th>Preview</th>
      </tr>
    </thead>
    <tbody id="viewsTbody"></tbody>
  </table>
</div>

let currentTab = 'eng';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-eng').classList.toggle('active', tab === 'eng');
  document.getElementById('tab-views').classList.toggle('active', tab === 'views');
  document.getElementById('pane-eng').classList.toggle('active', tab === 'eng');
  document.getElementById('pane-views').classList.toggle('active', tab === 'views');
  updateSubtitle();
}

function updateSubtitle() {
  const sub = document.getElementById('subtitle');
  if (currentTab === 'eng') {
    sub.textContent = `${engagementData.length} rows · Sortable & filterable · Click column headers to sort`;
  } else {
    sub.textContent = `${viewsData.length} rows · Sortable & filterable · Click column headers to sort`;
  }
}

// ===== Engagement Rate =====
let engSortKey = 'engagement_rate';
let engSortDir = 'desc';

function sortByEng(key) {
  if (engSortKey === key) {
    engSortDir = engSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    engSortKey = key;
    engSortDir = (key === 'engagement_rate') ? 'desc' : 'asc';
  }
  document.querySelectorAll('#engTable th').forEach(th => {
    th.classList.remove('sorted');
    const a = th.querySelector('.arrow');
    if (a) a.textContent = '↕';
  });
  const idx = ['term','engagement_rate','content_type','content_id','preview'].indexOf(key);
  if (idx < 4) {
    const ths = document.querySelectorAll('#engTable th');
    ths[idx].classList.add('sorted');
    ths[idx].querySelector('.arrow').textContent = engSortDir === 'asc' ? '↑' : '↓';
  }
  renderEng();
}

function engClass(v) {
  if (v >= 3.0) return 'engagement-high';
  if (v > 0) return 'engagement-mid';
  return 'engagement-zero';
}

function renderEng() {
  const search = document.getElementById('searchEng').value.toLowerCase();
  const engFilter = document.getElementById('engagementFilter').value;

  let filtered = engagementData.filter(d => {
    if (search && !d.term.toLowerCase().includes(search) && !d.content_id.toLowerCase().includes(search)) return false;
    if (engFilter === 'high' && d.engagement_rate < 3.0) return false;
    if (engFilter === 'mid' && (d.engagement_rate < 0.1 || d.engagement_rate >= 3.0)) return false;
    if (engFilter === 'zero' && d.engagement_rate > 0) return false;
    return true;
  });

  filtered.sort((a, b) => {
    let av = a[engSortKey], bv = b[engSortKey];
    if (typeof av === 'string') {
      return engSortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    }
    return engSortDir === 'asc' ? av - bv : bv - av;
  });

  const tbody = document.getElementById('engTbody');
  tbody.innerHTML = filtered.map(d => `
    <tr>
      <td>${d.term}</td>
      <td class="${engClass(d.engagement_rate)}">${d.engagement_rate.toFixed(2)}%</td>
      <td><span class="content-type-badge${d.content_type === 'STICKER' ? ' sticker' : ''}">${d.content_type}</span></td>
      <td><a href="${d.content_url}" target="_blank"><span class="content-id">${d.content_id}</span></a></td>
      <td><div class="preview-cell">
        <img class="gif-thumb" src="https://media.giphy.com/media/${d.content_id}/giphy-downsized.gif" alt="${d.term}" loading="lazy" onerror="this.style.display='none'">
        <a href="${d.content_url}" target="_blank">View on Giphy ↗</a>
      </div></td>
    </tr>
  `).join('');

  document.getElementById('statsEng').textContent = `${filtered.length} of ${engagementData.length} rows`;
}

// ===== View Count =====
let viewsSortKey = 'view_count';
let viewsSortDir = 'desc';

function sortByViews(key) {
  if (viewsSortKey === key) {
    viewsSortDir = viewsSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    viewsSortKey = key;
    viewsSortDir = (key === 'view_count') ? 'desc' : 'asc';
  }
  document.querySelectorAll('#viewsTable th').forEach(th => {
    th.classList.remove('sorted');
    const a = th.querySelector('.arrow');
    if (a) a.textContent = '↕';
  });
  const idx = ['view_count','content_type','content_id','preview'].indexOf(key);
  if (idx < 3) {
    const ths = document.querySelectorAll('#viewsTable th');
    ths[idx].classList.add('sorted');
    ths[idx].querySelector('.arrow').textContent = viewsSortDir === 'asc' ? '↑' : '↓';
  }
  renderViews();
}

function viewsClass(v) {
  if (v >= 5000) return 'views-high';
  if (v >= 1000) return 'views-mid';
  if (v >= 100) return 'views-low';
  return 'views-min';
}

function fmt(n) { return n.toLocaleString('en-US'); }

function renderViews() {
  const search = document.getElementById('searchViews').value.toLowerCase();
  const vf = document.getElementById('viewsFilter').value;

  let filtered = viewsData.filter(d => {
    if (search && !d.content_id.toLowerCase().includes(search)) return false;
    if (vf === 'high' && d.view_count < 5000) return false;
    if (vf === 'mid' && (d.view_count < 1000 || d.view_count >= 5000)) return false;
    if (vf === 'low' && (d.view_count < 100 || d.view_count >= 1000)) return false;
    if (vf === 'min' && d.view_count >= 100) return false;
    return true;
  });

  filtered.sort((a, b) => {
    let av = a[viewsSortKey], bv = b[viewsSortKey];
    if (typeof av === 'string') {
      return viewsSortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    }
    return viewsSortDir === 'asc' ? av - bv : bv - av;
  });

  const tbody = document.getElementById('viewsTbody');
  tbody.innerHTML = filtered.map(d => `
    <tr>
      <td class="view-count ${viewsClass(d.view_count)}">${fmt(d.view_count)}</td>
      <td><span class="content-type-badge${d.content_type === 'STICKER' ? ' sticker' : ''}">${d.content_type}</span></td>
      <td><a href="${d.content_url}" target="_blank"><span class="content-id">${d.content_id}</span></a></td>
      <td><div class="preview-cell">
        <img class="gif-thumb" src="https://media.giphy.com/media/${d.content_id}/giphy-downsized.gif" alt="${d.content_id}" loading="lazy" onerror="this.style.display='none'">
        <a href="${d.content_url}" target="_blank">View on Giphy ↗</a>
      </div></td>
    </tr>
  `).join('');

  document.getElementById('statsViews').textContent = `${filtered.length} of ${viewsData.length} rows`;
}

// Init
updateSubtitle();
renderEng();
renderViews();
// Mark initial sorted column on view count tab
(function(){
  const ths = document.querySelectorAll('#viewsTable th');
  ths[0].classList.add('sorted');
  ths[0].querySelector('.arrow').textContent = '↓';
})();
</script>
