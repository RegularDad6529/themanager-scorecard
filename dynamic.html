<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheManager Board — Live</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'JetBrains Mono', monospace;
  background: #f5f0e8;
  min-height: 100vh;
  padding: 1.25rem 1.25rem 0.5rem;
  color: #2a2520;
}

.scorecard {
  max-width: 560px;
  margin: 0 auto;
}

.header {
  margin-bottom: 1rem;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid #d4cab8;
}

.header-title {
  font-size: 1.4rem;
  font-weight: 700;
  color: #2a2520;
  letter-spacing: -0.01em;
  text-align: center;
}

.header-second {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.header-tagline {
  font-family: 'Caveat', cursive;
  font-size: 1rem;
  color: #968d80;
  font-weight: 400;
}

.header-date {
  font-family: 'Caveat', cursive;
  font-size: 0.95rem;
  color: #b5756b;
}

.zones {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.75rem;
}

.zone-card {
  background: #fffcf5;
  border-radius: 0.5rem;
  border: 1px solid #e0d8cc;
  padding: 0.75rem;
  box-shadow: 0 2px 4px rgba(42,37,32,0.06);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.zone-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding-bottom: 0.5rem;
  margin-bottom: 0.5rem;
  border-bottom: 1px solid #ede5d6;
  flex-wrap: wrap;
}

.zone-icon { font-size: 1.1rem; }

.zone-label {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-right: auto;
}

.zone-link {
  color: #c4b8a8;
  text-decoration: none;
  font-size: 0.65rem;
  transition: color 0.2s;
}
.zone-link:hover { color: #6b6358; }

.zone-metrics {
  display: grid;
  gap: 0.5rem;
  flex: 1;
  align-items: center;
  justify-items: center;
  text-align: center;
  padding: 0.25rem 0;
}

.hero-card { display: flex; flex-direction: column; }

.hero-value {
  font-family: 'Caveat', cursive;
  font-size: 2.25rem;
  font-weight: 700;
  text-align: center;
  padding: 0.25rem 0.5rem 0.5rem;
  letter-spacing: -0.01em;
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 1.5rem;
  padding: 0 0.5rem 0.25rem;
}

.hero-sub { display: flex; align-items: baseline; gap: 0.25rem; }

.hero-sub-value {
  font-family: 'Caveat', cursive;
  font-size: 2.25rem;
  font-weight: 700;
}

.hero-sub-label {
  font-size: 0.625rem;
  color: #968d80;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.metric { display: flex; flex-direction: column; gap: 0.15rem; }

.metric-value {
  font-family: 'Caveat', cursive;
  font-size: 2.25rem;
  font-weight: 700;
  line-height: 1.1;
}

.metric-label {
  font-size: 0.625rem;
  color: #968d80;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.footer {
  margin-top: 1rem;
  padding-top: 0.75rem;
  border-top: 1px solid #e0d8cc;
  font-size: 0.625rem;
  color: #c4b8a8;
  text-align: center;
}
.footer a { color: #968d80; text-decoration: none; }

/* Loading + error states */
.loading {
  text-align: center;
  padding: 3rem 1rem;
  font-family: 'Caveat', cursive;
  font-size: 1.5rem;
  color: #968d80;
}
.error-box {
  text-align: center;
  padding: 2rem 1rem;
  font-size: 0.8rem;
  color: #d62728;
  background: #fffcf5;
  border-radius: 0.5rem;
  border: 1px solid #e0d8cc;
  margin: 1rem 0;
}
.error-box a { color: #d62728; text-decoration: underline; }
</style>
</head>
<body>
<div class="scorecard">
  <div class="header">
    <div class="header-title">TheManager Report</div>
    <div class="header-second">
      <span class="header-tagline">Tracking agentic coordination</span>
      <span class="header-date" id="header-date">—</span>
    </div>
  </div>
  <div id="board">
    <div class="loading">Loading board…</div>
  </div>
  <div class="footer">
    Data: <a href="https://github.com/RegularDad6529/themanager-board" target="_blank">GitHub repo</a>
  </div>
</div>

<script>
const REPO = "RegularDad6529/themanager-board";
const BRANCH = "main";
const RAW_BASE = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;
const API_BASE = `https://api.github.com/repos/${REPO}`;

// ── Helpers ──────────────────────────────────────

function formatValue(value, fmt) {
  if (value === null || value === undefined) return "—";
  if (fmt === "int") return String(parseInt(value));
  if (fmt === "votes") {
    if (typeof value === "number") {
      if (value >= 1_000_000) return (value / 1_000_000).toFixed(1) + "M";
      if (value >= 1_000)     return (value / 1_000).toFixed(1) + "K";
      return String(parseInt(value));
    }
    return String(value);
  }
  if (fmt === "handle") {
    return (value && !String(value).startsWith("@")) ? "@" + value : String(value);
  }
  return String(value);
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ── Data fetching ────────────────────────────────

async function fetchJSON(url) {
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText} — ${url}`);
  return res.json();
}

async function loadConfig() {
  return fetchJSON(`${RAW_BASE}/config/scorecard_config.json`);
}

async function loadLatestData() {
  // List data/ directory via GitHub API, pick the newest data_*.json
  const entries = await fetchJSON(`${API_BASE}/contents/data?ref=${BRANCH}`);
  const dataFiles = entries
    .filter(e => e.type === "file" && /^data_\d{4}-\d{2}-\d{2}\.json$/.test(e.name))
    .sort((a, b) => b.name.localeCompare(a.name)); // newest first

  if (dataFiles.length === 0) throw new Error("No data files found in data/");

  // Try newest first; fall back to next if fetch fails
  for (const f of dataFiles.slice(0, 5)) {
    try {
      const data = await fetchJSON(`${RAW_BASE}/data/${f.name}`);
      const date = f.name.replace("data_", "").replace(".json", "");
      return { data, date };
    } catch (e) {
      console.warn(`Failed to load ${f.name}:`, e.message);
    }
  }
  throw new Error("Could not load any data file");
}

// ── Rendering ────────────────────────────────────

function renderBoard(config, data, dateStr) {
  document.getElementById("header-date").textContent = dateStr;

  const zones = config.zones || [];
  let html = '<div class="zones">';

  for (const zone of zones) {
    const zd = data[zone.id] || {};
    const color = zone.color || "#64748b";
    const icon  = zone.icon || "■";
    const label = zone.label || zone.id.toUpperCase();
    const layout = zone.layout || "grid";

    // Build links
    let linkHTML = "";
    if (zone.wave_url)
      linkHTML += ` <a href="${esc(zone.wave_url)}" target="_blank" class="zone-link">↗ wave</a>`;
    if (zone.graph_url)
      linkHTML += ` <a href="${esc(zone.graph_url)}" target="_blank" class="zone-link">📈 graph</a>`;
    for (const el of (zone.extra_links || []))
      linkHTML += ` · <a href="${esc(el.url)}" target="_blank" class="zone-link">${esc(el.label)}</a>`;

    if (layout === "hero") {
      const heroMetric = (zone.metrics || [{}])[0];
      const heroVal = formatValue(zd[heroMetric.key], heroMetric.format || "string");
      let subHTML = "";
      for (const m of (zone.metrics || []).slice(1)) {
        const val = formatValue(zd[m.key], m.format || "string");
        subHTML += `<span class="hero-sub"><span class="hero-sub-value" style="color:${color}">${esc(val)}</span> <span class="hero-sub-label">${esc(m.label)}</span></span>`;
      }
      html += `
        <div class="zone-card hero-card" style="border-color:${color}40;">
          <div class="zone-header" style="border-bottom-color:${color}30;">
            <span class="zone-icon">${icon}</span>
            <span class="zone-label" style="color:${color}">${esc(label)}</span>
            ${linkHTML}
          </div>
          <div class="hero-value" style="color:${color}">${esc(heroVal)}</div>
          <div class="hero-stats">${subHTML}</div>
        </div>`;
    } else {
      const metrics = zone.metrics || [];
      let metricsHTML = "";
      for (const m of metrics) {
        const val = formatValue(zd[m.key], m.format || "string");
        metricsHTML += `
              <div class="metric">
                <div class="metric-value" style="color:${color}">${esc(val)}</div>
                <div class="metric-label">${esc(m.label)}</div>
              </div>`;
      }
      const n = metrics.length;
      const cols = n <= 1 ? "1" : n <= 4 ? "2" : "3";
      html += `
        <div class="zone-card" style="border-color:${color}40;">
          <div class="zone-header" style="border-bottom-color:${color}30;">
            <span class="zone-icon">${icon}</span>
            <span class="zone-label" style="color:${color}">${esc(label)}</span>
            ${linkHTML}
          </div>
          <div class="zone-metrics" style="grid-template-columns:repeat(${cols},1fr);">
            ${metricsHTML}
          </div>
        </div>`;
    }
  }

  html += "</div>";
  document.getElementById("board").innerHTML = html;
}

function renderError(msg) {
  document.getElementById("board").innerHTML = `
    <div class="error-box">
      ⚠️ Could not load board data.<br><br>
      ${esc(msg)}<br><br>
      Check the <a href="https://github.com/RegularDad6529/themanager-board" target="_blank">repo</a> or try again.
    </div>`;
}

// ── Main ─────────────────────────────────────────

(async () => {
  try {
    const [config, { data, date }] = await Promise.all([
      loadConfig(),
      loadLatestData(),
    ]);
    renderBoard(config, data, date);
  } catch (err) {
    console.error(err);
    renderError(err.message);
  }
})();
</script>
</body>
</html>
